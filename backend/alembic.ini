# Alembic configuration for SFP Entity Formation API

[alembic]
# Path to migration scripts — relative to this file
script_location = alembic

# Template used for new migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(slug)s

# Truncate long revision identifiers in file names
truncate_slug_length = 40

# Set to true to run the environment during 'revision' to detect auto-generate
revision_environment = false

# Timezone for file_template date rendering (leave blank for localtime)
timezone =

# The database URL is loaded from app.config at runtime — do not hardcode here.
# sqlalchemy.url is set programmatically in alembic/env.py.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
